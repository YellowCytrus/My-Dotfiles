# Portal 2 / Aperture Science — Hypridle Configuration

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Warn — Aperture Science idle warning
listener {
    timeout = 540
    on-timeout = notify-send -u low "◉ APERTURE SCIENCE" "FACILITY ENTERING SLEEP MODE\nInactivity detected. Locking in 60 seconds."
    on-resume = notify-send -u low "◉ APERTURE SCIENCE" "FACILITY REACTIVATED\nWelcome back, test subject."
}

# Lock
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# DPMS off — 30 seconds after lock to prevent burn-in
listener {
    timeout = 630
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
