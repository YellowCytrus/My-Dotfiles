# /* ---- 💫 https://github.com/JaKooLit   💫 ---- */  #
# always refer to Hyprland wiki
# https://wiki.hyprland.org/

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,48

# Initial boot script to apply wallpapers, theming, etc.
# Do not delete unless you know what you're doing.
exec-once = $HOME/.config/hypr/initial-boot.sh

# Sourcing external config files
$configs = $HOME/.config/hypr/configs
source = $configs/Keybinds.conf

# User Configs — your playground
$UserConfigs = $HOME/.config/hypr/UserConfigs

source = $UserConfigs/Startup_Apps.conf
source = $UserConfigs/ENVariables.conf
# source = $UserConfigs/Monitors.conf        # deprecated
# source = $UserConfigs/WorkspaceRules.conf  # deprecated

source = $UserConfigs/Laptops.conf
source = $UserConfigs/LaptopDisplay.conf
source = $UserConfigs/WindowRules.conf
source = $UserConfigs/UserDecorations.conf
source = $UserConfigs/UserAnimations.conf
source = $UserConfigs/UserKeybinds.conf
source = $UserConfigs/UserSettings.conf
source = $UserConfigs/01-UserDefaults.conf

# nwg-displays (monitor setup)
source = $HOME/.config/hypr/monitors.conf

# ❌ REMOVED: source = $HOME/.config/hypr/workspaces.conf
# → Workspace rules are now defined inline below to avoid old syntax

# === WORKSPACE & WINDOW RULES (modern syntax) ===

# App-specific workspaces
windowrulev2 = workspace 4, class:^(obsidian)$
windowrulev2 = workspace 5, class:^(DBeaver)$

# Optional: add more if needed
# windowrulev2 = workspace 2, class:^(firefox|Google-chrome)$

# Note: Rules like `class:^$` (empty class) are removed — they cause parsing issues
# and rarely do anything useful in real-world usage.


input {
    kb_layout  = us,ru         # или свои раскладки
    kb_variant =
    kb_options = grp:caps_toggle,grp_led:caps,caps:none
}
