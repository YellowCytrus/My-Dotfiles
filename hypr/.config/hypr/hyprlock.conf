source = colors.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = ~/Pictures/wallpapers/Aperture-Science.png
    color = rgb(0d0e1a)

    blur_size = 6
    blur_passes = 3
    noise = 0.02
    contrast = 1.0
    brightness = 0.3
    vibrancy = 0.1
    vibrancy_darkness = 0.5
}

# Aperture Science Header
label {
    monitor =
    text = APERTURE SCIENCE
    color = rgba(00a1e4ff)
    font_size = 28
    font_family = JetBrainsMono NF Bold
    shadow_passes = 0

    position = 0, 280
    halign = center
    valign = center
}

# Subheader
label {
    monitor =
    text = ENRICHMENT CENTER
    color = rgba(7a7a90ff)
    font_size = 14
    font_family = JetBrainsMono NF
    shadow_passes = 0

    position = 0, 240
    halign = center
    valign = center
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H")</b>"
    color = rgba(d0d0e0ff)
    font_size = 96
    font_family = JetBrainsMono NF Bold
    shadow_passes = 0

    position = 0, 140
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%M")</b>"
    color = rgba(d0d0e0ff)
    font_size = 96
    font_family = JetBrainsMono NF Bold
    shadow_passes = 0

    position = 0, 20
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%Y.%m.%d // %A')" | tr '[:lower:]' '[:upper:]'
    color = rgba(7a7a90ff)
    font_size = 13
    font_family = JetBrainsMono NF
    shadow_passes = 0

    position = 0, -50
    halign = center
    valign = center
}

# Auth prompt
label {
    monitor =
    text = TEST SUBJECT AUTHENTICATION REQUIRED
    color = rgba(ff6a00ff)
    font_size = 11
    font_family = JetBrainsMono NF Bold

    position = 0, 170
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 280, 44
    outline_thickness = 2

    dots_size = 0.22
    dots_spacing = 0.5
    dots_center = true
    dots_rouding = 2

    rounding = 4
    outer_color = rgba(00a1e4ff)
    inner_color = rgba(1a1b2e80)
    font_color = rgba(d0d0e0ff)
    fade_on_empty = true
    placeholder_text = <i>credentials...</i>
    fail_color = rgba(ff3d3dff)
    fail_text = <i>ACCESS DENIED</i>

    position = 0, 120
    halign = center
    valign = bottom
}
