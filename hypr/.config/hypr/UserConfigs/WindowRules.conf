# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# NOTES: This is only for Hyprland > 0.48
# Updated for Hyprland 0.53.1 (windowrule v3 syntax)

# note for ja: This should NOT be implemented on Debian and Ubuntu

# windowrule - tags - add apps under appropriate tag to use the same settings
# browser tags
windowrule = match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$, tag +browser
windowrule = match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$, tag +browser
windowrule = match:class ^(chrome-.+-Default)$, tag +browser # Chrome PWAs
windowrule = match:class ^([Cc]hromium)$, tag +browser
windowrule = match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$, tag +browser
windowrule = match:class ^(Brave-browser(-beta|-dev|-unstable)?)$, tag +browser
windowrule = match:class ^([Tt]horium-browser|[Cc]achy-browser)$, tag +browser
windowrule = match:class ^(zen-alpha|zen)$, tag +browser

# notif tags
windowrule = match:class ^(swaync-control-center|swaync-notification-window|swaync-client|class)$, tag +notif

# KooL settings tag
windowrule = match:title ^(KooL Quick Cheat Sheet)$, tag +KooL_Cheat
windowrule = match:title ^(KooL Hyprland Settings)$, tag +KooL_Settings
windowrule = match:class ^(nwg-displays|nwg-look)$, tag +KooL-Settings

# terminal tags
windowrule = match:class ^(Alacritty|kitty|kitty-dropterm)$, tag +terminal

# email tags
windowrule = match:class ^([Tt]hunderbird|org.gnome.Evolution)$, tag +email
windowrule = match:class ^(eu.betterbird.Betterbird)$, tag +email

# project tags
windowrule = match:class ^(codium|codium-url-handler|VSCodium)$, tag +projects
windowrule = match:class ^(VSCode|code-url-handler)$, tag +projects
windowrule = match:class ^(jetbrains-.+)$, tag +projects # JetBrains IDEs

# screenshare tags
windowrule = match:class ^(com.obsproject.Studio)$, tag +screenshare

# IM tags
windowrule = match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$, tag +im
windowrule = match:class ^([Ff]erdium)$, tag +im
windowrule = match:class ^([Ww]hatsapp-for-linux)$, tag +im
windowrule = match:class ^(ZapZap|com.rtosta.zapzap)$, tag +im
windowrule = match:class ^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$, tag +im
windowrule = match:class ^(teams-for-linux)$, tag +im
windowrule = match:class ^(im.riot.Riot|Element)$, tag +im # Element Matrix client

# game tags
windowrule = match:class ^(gamescope)$, tag +games
windowrule = match:class ^(steam_app_\d+)$, tag +games

# gamestore tags
windowrule = match:class ^([Ss]team)$, tag +gamestore
windowrule = match:title ^([Ll]utris)$, tag +gamestore
windowrule = match:class ^(com.heroicgameslauncher.hgl)$, tag +gamestore

# file-manager tags
windowrule = match:class ^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt)$, tag +file-manager
windowrule = match:class ^(app.drey.Warp)$, tag +file-manager

# wallpaper tags
windowrule = match:class ^([Ww]aytrogen)$, tag +wallpaper

# multimedia tags
windowrule = match:class ^([Aa]udacious)$, tag +multimedia

# multimedia-video tags
windowrule = match:class ^([Mm]pv|vlc)$, tag +multimedia_video

# settings tags
windowrule = match:title ^(ROG Control)$, tag +settings
windowrule = match:class ^(wihotspot(-gui)?)$, tag +settings # wifi hotspot
windowrule = match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$, tag +settings # Disk usage analyzer
windowrule = match:class ^(gnome-disks|wihotspot(-gui)?)$, tag +settings
windowrule = match:title ^(Kvantum Manager)$, tag +settings
windowrule = match:class ^(file-roller|org.gnome.FileRoller)$, tag +settings # archive manager
windowrule = match:class ^(nm-applet|nm-connection-editor|blueman-manager)$, tag +settings
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, tag +settings
windowrule = match:class ^(qt5ct|qt6ct|[Yy]ad)$, tag +settings
windowrule = match:class ^(xdg-desktop-portal-gtk)$, tag +settings
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, tag +settings
windowrule = match:class ^([Rr]ofi)$, tag +settings

# viewer tags
windowrule = match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$, tag +viewer # system monitor
windowrule = match:class ^(evince)$, tag +viewer # document viewer
windowrule = match:class ^(eog|org.gnome.Loupe)$, tag +viewer # image viewer

# Some special override rules
windowrule = match:tag multimedia_video*, no_blur on
windowrule = match:tag multimedia_video*, opacity 1.0 override 1.0 override
windowrule = match:tag games*, opacity 1.0 override 1.0 override
windowrule = match:class ^(cursor|code|Code|VSCode|code-url-handler)$, opacity 1 override 1.0 override
windowrule = match:class ^(obsidian|Obsidian)$, opacity 1.0 override 1.0 override
#windowrule = match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$, opacity 1.0 override 1.0 override

# POSITION
# windowrule = center,floating:1 # warning, it cause even the menu to float and center.
windowrule = match:tag KooL_Cheat*, center on
windowrule = match:class ^([Tt]hunar), match:title negative:.*[Tt]hunar.*, center on
windowrule = match:title ^(ROG Control)$, center on
windowrule = match:tag KooL-Settings*, center on
windowrule = match:title ^(Keybindings)$, center on
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, center on
windowrule = match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$, center on
windowrule = match:class ^([Ff]erdium)$, center on
windowrule = match:title ^(Picture-in-Picture)$, move 72% 7%
#windowrule = move 72% 7%,title:^(Firefox)$

# windowrule to avoid idle for fullscreen apps
# Note: idleinhibit is not a windowrule property in v3, use windowrulev2 or other methods
#windowrule = idleinhibit fullscreen, class:^(*)$
#windowrule = idleinhibit fullscreen, title:^(*)$
#windowrule = match:fullscreen 1, idleinhibit fullscreen

# windowrule move to workspace
windowrule = match:tag email*, workspace 1
windowrule = match:tag browser*, workspace 2
#windowrule = workspace 3, class:^([Tt]hunar)$
#windowrule = workspace 3, tag:projects*
windowrule = match:tag gamestore*, workspace 5
windowrule = match:tag im*, workspace 7
windowrule = match:tag games*, workspace 8

# windowrule move to workspace (silent)
windowrule = match:tag screenshare*, workspace 4 silent
windowrule = match:class ^(virt-manager)$, workspace 6 silent
windowrule = match:class ^(.virt-manager-wrapped)$, workspace 6 silent
windowrule = match:tag multimedia*, workspace 9 silent

# FLOAT
windowrule = match:tag KooL_Cheat*, float yes
windowrule = match:tag wallpaper*, float yes
windowrule = match:tag settings*, float yes
windowrule = match:tag viewer*, float yes
windowrule = match:tag KooL-Settings*, float yes
windowrule = match:class ^([Zz]oom|onedriver|onedriver-launcher)$, float yes
windowrule = match:class ^(org.gnome.Calculator), match:title ^(Calculator)$, float yes
windowrule = match:class ^(mpv|com.github.rafostar.Clapper)$, float yes
windowrule = match:class ^([Qq]alculate-gtk)$, float yes
#windowrule = float, class:^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
windowrule = match:class ^([Ff]erdium)$, float yes
windowrule = match:title ^(Picture-in-Picture)$, float yes
#windowrule = float, title:^(Firefox)$

# windowrule - ######### float popups and dialogue #######
windowrule = match:title ^(Authentication Required)$, float yes
windowrule = match:title ^(Authentication Required)$, center on
windowrule = match:class ^(codium|codium-url-handler|VSCodium), match:title negative:.*codium.*|.*VSCodium.*, float yes
windowrule = match:class ^(com.heroicgameslauncher.hgl)$, match:title negative:Heroic Games Launcher, float yes
windowrule = match:class ^([Ss]team)$, match:title negative:^([Ss]team)$, float yes
windowrule = match:class ^([Tt]hunar), match:title negative:.*[Tt]hunar.*, float yes

windowrule = match:title ^(Add Folder to Workspace)$, float yes
windowrule = match:title ^(Add Folder to Workspace)$, size 70% 60%
windowrule = match:title ^(Add Folder to Workspace)$, center on

windowrule = match:title ^(Save As)$, float yes
windowrule = match:title ^(Save As)$, size 70% 60%
windowrule = match:title ^(Save As)$, center on

windowrule = match:title ^(Open Files)$, float yes
windowrule = match:title ^(Open Files)$, size 70% 60%

windowrule = match:title ^(SDDM Background)$, float yes #KooL's Dots YAD for setting SDDM background
windowrule = match:title ^(SDDM Background)$, center on #KooL's Dots YAD for setting SDDM background
windowrule = match:title ^(SDDM Background)$, size 16% 12% #KooL's Dots YAD for setting SDDM background
# END of float popups and dialogue #######

# OPACITY — inactive: только акриловое размытие, GUI скрыт (0.02)
windowrule = match:tag browser*, opacity 0.93 0.02
windowrule = match:tag projects*, opacity 0.95 0.02
windowrule = match:tag im*, opacity 0.92 0.02
windowrule = match:tag multimedia*, opacity 0.92 0.02
windowrule = match:tag file-manager*, opacity 0.92 0.02
windowrule = match:tag terminal*, opacity 0.85 0.02
windowrule = match:tag settings*, opacity 0.88 0.02
windowrule = match:tag viewer*, opacity 0.90 0.02
windowrule = match:tag wallpaper*, opacity 0.90 0.02
windowrule = match:class ^(gedit|org.gnome.TextEditor|mousepad)$, opacity 0.90 0.02
windowrule = match:class ^(deluge)$, opacity 0.90 0.02
windowrule = match:class ^(seahorse)$, opacity 0.90 0.02
windowrule = match:title ^(Picture-in-Picture)$, opacity 1.0 0.02

# SIZE
windowrule = match:tag KooL_Cheat*, size 65% 90%
windowrule = match:tag wallpaper*, size 70% 70%
windowrule = match:tag settings*, size 70% 70%
windowrule = match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$, size 60% 70%
windowrule = match:class ^([Ff]erdium)$, size 60% 70%

#windowrule = size 25% 25%, title:^(Picture-in-Picture)$
#windowrule = size 25% 25%, title:^(Firefox)$

# PINNING
windowrule = match:title ^(Picture-in-Picture)$, pin yes
#windowrule = pin,title:^(Firefox)$

# windowrule - extras
# Note: keepaspectratio may not be supported in v3, using persistent_size instead
windowrule = match:title ^(Picture-in-Picture)$, persistent_size yes

# BLUR & FULLSCREEN
windowrule = match:tag games*, no_blur on
windowrule = match:tag games*, fullscreen yes

#windowrule = bordercolor rgb(EE4B55) rgb(880808), fullscreen:1
#windowrule = bordercolor rgb(282737) rgb(1E1D2D), floating:1
#windowrule = opacity 0.8 0.8, pinned:1

# LAYER RULES
# Note: layerrule syntax in v3 - some properties may have changed
layerrule = match:namespace rofi, blur on
#layerrule = match:namespace rofi, ignorezero on  # ignorezero may not be supported in v3
layerrule = match:namespace notifications, blur on
#layerrule = match:namespace notifications, ignorezero on  # ignorezero may not be supported in v3
layerrule = match:namespace quickshell:overview, blur on
#layerrule = match:namespace quickshell:overview, ignorezero on  # ignorezero may not be supported in v3
#layerrule = match:namespace quickshell:overview, ignorealpha 0.5  # ignorealpha may not be supported in v3

#layerrule = ignorealpha 0.5, tag:notif*

#layerrule = ignorezero, class:^([Rr]ofi)$
#layerrule = blur, class:^([Rr]ofi)$
#layerrule = unset,class:^([Rr]ofi)$
#layerrule = ignorezero, <rofi>

#layerrule = ignorezero, overview
#layerrule = blur, overview

# obsidian tag и workspace 4
windowrule = match:class ^(obsidian|Obsidian)$, tag +obsidian
windowrule = match:tag obsidian*, workspace 4 silent
