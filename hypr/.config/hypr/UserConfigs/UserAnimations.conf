# Portal 2 / Aperture Science — Animations
# Precise, clinical, mechanical — like Aperture test chamber panels sliding into place

animations {
  enabled = yes

  bezier = aperture, 0.25, 0.1, 0.25, 1.0
  bezier = panelSlide, 0.16, 1, 0.3, 1
  bezier = panelIn, 0.0, 0.0, 0.2, 1.0
  bezier = panelOut, 0.4, 0.0, 1.0, 1.0
  bezier = liner, 1, 1, 1, 1
  bezier = mechanical, 0.22, 0.68, 0.0, 1.0

  animation = windows, 1, 4, panelSlide, slide
  animation = windowsIn, 1, 3, panelIn, popin 80%
  animation = windowsOut, 1, 3, panelOut, popin 80%
  animation = windowsMove, 1, 4, aperture, slide
  animation = border, 1, 8, liner
  animation = fade, 1, 3, aperture
  animation = workspaces, 1, 4, mechanical, slide
  animation = workspacesIn, 1, 4, panelIn, slide
  animation = workspacesOut, 1, 4, panelOut, slide
}
