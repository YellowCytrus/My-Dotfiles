font_family JetBrainsMono NF Bold
font_size 12.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.85
confirm_os_window_close 0

# Animated cursor
cursor_trail 1
cursor_trail_decay 0.1 0.3
cursor_shape beam
cursor_beam_thickness 1.8

linux_display_server auto

scrollback_lines 5000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 6 8

# Tab bar — Aperture Science facility panels
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_bar_min_tabs 1
tab_title_template " {index}: {title} "
active_tab_title_template " ◉ {title} "
tab_bar_background #0a0b16
active_tab_foreground #0d0e1a
active_tab_background #00a1e4
active_tab_font_style bold
inactive_tab_foreground #7a7a90
inactive_tab_background #1a1b2e
inactive_tab_font_style normal

# Window splits — facility panel separators
active_border_color #00a1e4
inactive_border_color #2a2b45
window_border_width 1.5pt
draw_minimal_borders yes
window_margin_width 1
single_window_margin_width 0

# Title bar
wayland_titlebar_color #0d0e1a
hide_window_decorations yes

include colors.conf
